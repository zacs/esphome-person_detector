# -----------------------------------------------------------------------------
# Installable D1001 firmware — built by CI into a flashable firmware.factory.bin
# (see .github/workflows/firmware.yml). Self-contained: local components, and
# Wi-Fi provisioning via AP + captive portal / Improv, so NO secrets are needed
# to build. Flash it, then join the "reTerminal Presence" AP (or use Improv over
# USB / the web flasher) to set your Wi-Fi.
#
# Toolchain: ESPHome 2026.6.0 / ESP-IDF 5.5.4.  Target: Seeed reTerminal D1001.
#
# NOTE: this first installable omits the camera power/reset expander (its I2C bus
# pins are board-specific and unknown here, and would collide with the ESP-Hosted
# SDIO pins). If the camera isn't detected on boot, add the PCA9535 expander +
# enable/powerdown/reset pins (see example/reterminal_d1001.yaml) and re-flash /
# OTA. Verify rotation / channel order per BRINGUP.md.
# -----------------------------------------------------------------------------

esphome:
  name: reterminal-presence
  friendly_name: reTerminal Presence

esp32:
  variant: ESP32P4
  # The reTerminal D1001 ships pre-rev3 P4 silicon (ROM reports "esp32p4-eco2").
  # Required, or the rev3 bootloader crashes at entry with an illegal
  # instruction. This also defaults the CPU to a safe 360 MHz (not 400 MHz).
  engineering_sample: true
  flash_size: 16MB
  partitions: partitions.csv
  framework:
    type: esp-idf
    version: 5.5.4

psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG

# ESP32-P4 has no radio: Wi-Fi/BLE come from the on-board ESP32-C6 over
# ESP-Hosted (SDIO). Pins from Seeed-Studio/reTerminal-D1001
# examples/factory_firmware/sdkconfig.defaults (CONFIG_ESP_HOSTED_SDIO_*).
esp32_hosted:
  variant: ESP32C6
  type: sdio
  clk_pin: GPIO11
  cmd_pin: GPIO6
  d0_pin: GPIO7
  d1_pin: GPIO8
  d2_pin: GPIO9
  d3_pin: GPIO10
  bus_width: 4
  reset_pin: GPIO13
  active_high: true

# Provisionable networking — no secrets required to build.
wifi:
  ap:
    ssid: "reTerminal Presence"
captive_portal:
improv_serial:

api:
ota:
  platform: esphome

external_components:
  - source:
      type: local
      path: ../components
    components: [person_detect, esp_video_camera]

# --- MIPI-CSI capture (SC2356) ------------------------------------------------
esp_video_camera:
  id: d1001_cam
  sda: 37               # SC2356 SCCB (sensor I2C)
  scl: 38
  resolution: 1280x720
  rotation: 90          # portrait mount — verify direction (BRINGUP.md)
  swap_rgb: false

# --- Detector -----------------------------------------------------------------
person_detect:
  id: presence
  frame_source_id: d1001_cam
  interval: 1500ms
  confidence_threshold: 60%
  clear_after: 3

binary_sensor:
  - platform: person_detect
    person_detect_id: presence
    name: "Room Occupied"
    filters:
      - delayed_off: 15s

sensor:
  - platform: person_detect
    person_detect_id: presence
    type: confidence
    name: "Presence Confidence"
  - platform: person_detect
    person_detect_id: presence
    type: count
    name: "People Count"

switch:
  - platform: person_detect
    person_detect_id: presence
    name: "Presence Detection"
