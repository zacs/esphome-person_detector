# -----------------------------------------------------------------------------
# Installable person_detect firmware for the Seeed reTerminal D1001 (ESP32-P4).
# Built by CI into a flashable firmware.factory.bin (see firmware.yml).
#
# The board bring-up (esp32/psram/esp32_hosted/i2c/xl9535) mirrors the known-good
# reTerminal D1001 config from github.com/zacs/espcontrol
# (devices/seeed-esp32-p4-reterminal-d1001/device/device.yaml) rather than being
# derived by hand. Self-contained + provisionable: Wi-Fi AP + captive portal /
# Improv, no secrets needed to build. Flash, then join the AP / Improv to set
# Wi-Fi. Camera bring-up per BRINGUP.md.
# -----------------------------------------------------------------------------

esphome:
  name: reterminal-presence
  friendly_name: reTerminal Presence

esp32:
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHZ
  # D1001 ships pre-rev3 P4 silicon (ROM "esp32p4-eco2").
  engineering_sample: true
  framework:
    type: esp-idf
    version: 5.5.4
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true
    sdkconfig_options:
      CONFIG_SDMMC_HOST_DEFAULT: "y"
      CONFIG_COMPILER_OPTIMIZATION_SIZE: "y"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_HOSTED_DFLT_TASK_FROM_SPIRAM: "y"
  # No custom partition table: flash_size: 16MB lets ESPHome generate a
  # self-consistent table + matching factory image (avoids offset mismatches).

psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG

# Wi-Fi/BLE come from the on-board ESP32-C6 over ESP-Hosted (SDIO).
esp32_hosted:
  variant: esp32c6
  reset_pin: GPIO13
  cmd_pin: GPIO6
  clk_pin: GPIO11
  d0_pin: GPIO7
  d1_pin: GPIO8
  d2_pin: GPIO9
  d3_pin: GPIO10
  active_high: true
  sdio_frequency: 20MHz

# Provisionable networking — no secrets required to build.
wifi:
  ap:
    ssid: "reTerminal Presence"
captive_portal:
improv_serial:

api:
ota:
  platform: esphome

external_components:
  - source:
      type: local
      path: ../components
    components: [person_detect, esp_video_camera]

# Camera power/reset lines are on the XL9535 I2C GPIO expander (its own bus).
i2c:
  - id: bus_expander
    sda: GPIO20
    scl: GPIO21
    frequency: 400kHz

xl9535:
  - id: cam_expander
    i2c_id: bus_expander
    address: 0x20

# --- MIPI-CSI capture (SC2356) ------------------------------------------------
esp_video_camera:
  id: d1001_cam
  sda: 37               # SC2356 SCCB (sensor I2C)
  scl: 38
  resolution: 1280x720
  rotation: 90          # portrait mount — verify direction (BRINGUP.md)
  swap_rgb: false
  enable_pin:           # CAM_EN = expander bit 1
    xl9535: cam_expander
    number: 1
  powerdown_pin:        # PWDN = expander bit 3
    xl9535: cam_expander
    number: 3
  reset_pin:            # RST = register bit 9 = P1.1 = xl9535 pin 11 (active-low)
    xl9535: cam_expander
    number: 11
    inverted: true

# --- Detector -----------------------------------------------------------------
person_detect:
  id: presence
  frame_source_id: d1001_cam
  interval: 1500ms
  confidence_threshold: 60%
  clear_after: 3

binary_sensor:
  - platform: person_detect
    person_detect_id: presence
    name: "Room Occupied"
    filters:
      - delayed_off: 15s

sensor:
  - platform: person_detect
    person_detect_id: presence
    type: confidence
    name: "Presence Confidence"
  - platform: person_detect
    person_detect_id: presence
    type: count
    name: "People Count"

switch:
  - platform: person_detect
    person_detect_id: presence
    name: "Presence Detection"
