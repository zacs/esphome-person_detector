name: Firmware

# Builds an installable ESP32-P4 image for the reTerminal D1001 and publishes it.
# - workflow_dispatch: build + attach the binaries as run artifacts (download &
#   flash from the Actions run).
# - push of a version tag (v*): build + create a GitHub Release with the binaries
#   attached, giving a traceable version -> commit -> firmware chain.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.0). Blank = artifact only."
        required: false
        default: ""
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  ESPHOME_VERSION: "2026.6.0"
  # name -> config. The standalone image is the one to flash normally; the
  # shared-i2c image exercises esp_video_camera's i2c_id: (share an existing bus).
  NAME: reterminal-presence

jobs:
  build:
    name: Build reference images (reTerminal D1001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache PlatformIO / ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-fw-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-${{ hashFiles('firmware/reterminal_d1001*.yaml') }}
          restore-keys: pio-fw-${{ runner.os }}-${{ env.ESPHOME_VERSION }}-
      - name: Install ESPHome
        run: pip install "esphome==${ESPHOME_VERSION}"
      - name: Compile
        run: |
          set -euo pipefail
          esphome compile firmware/reterminal_d1001.yaml
          esphome compile firmware/reterminal_d1001_shared_i2c.yaml
      - name: Collect binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for name in reterminal-presence reterminal-presence-shared-i2c; do
            factory=$(find "firmware/.esphome/build/${name}" -name firmware.factory.bin | head -1)
            ota=$(find "firmware/.esphome/build/${name}" -name firmware.ota.bin | head -1)
            cp "$factory" "dist/${name}.factory.bin"
            cp "$ota" "dist/${name}.ota.bin"
          done
          ls -l dist
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.NAME }}-firmware
          path: dist/*
          if-no-files-found: error
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          # --target creates the tag at this commit if it doesn't exist yet.
          gh release create "$TAG" dist/* \
            --target "${GITHUB_SHA}" \
            --title "person_detect $TAG" \
            --notes "person_detect $TAG — prebuilt reference image for the first
          supported board, the Seeed reTerminal D1001 (ESP32-P4, MIPI-CSI SC2356).
          The component itself is board/model/sensor generic; see README.

          Flash \`${NAME}.factory.bin\` to offset 0x0 (esptool or the ESPHome web
          flasher), then provision Wi-Fi via the \"reTerminal Presence\" AP /
          captive portal or Improv over USB. Verify camera bring-up per BRINGUP.md."
