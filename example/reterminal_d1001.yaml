# -----------------------------------------------------------------------------
# person_detect — full working example for the Seeed Studio reTerminal D1001
# (ESP32-P4 + MIPI-CSI SC2356 2 MP camera), using the on-board esp_video_camera
# capture backend (CSI + ISP + PPA -> RGB888). On-device only; no frame leaves.
#
# Tested toolchain: ESPHome 2026.6.0 (ESP-IDF v5.5.4).
# Compile:  esphome compile example/reterminal_d1001.yaml
#
# HARDWARE BRING-UP: pins/rotation/channel-order below are the best-known values
# for the D1001; verify against your board on first flash. See BRINGUP.md.
# -----------------------------------------------------------------------------

esphome:
  name: reterminal-d1001-presence
  friendly_name: reTerminal Presence

esp32:
  variant: ESP32P4
  flash_size: 16MB
  partitions: partitions.csv   # ~2 MB app image (embedded model) — see README
  framework:
    type: esp-idf
    version: 5.5.4

# Model runtime, capture buffers, and the PPA output frame all live in PSRAM.
psram:
  mode: hex
  speed: 200MHz

logger:
  level: DEBUG                 # inference time / arena / PPA timing at DEBUG

api:
ota:
  platform: esphome
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source: github://zacs/esphome-person_detector
    components: [person_detect, esp_video_camera]

# --- I2C GPIO expander (PCA9535 / XL9535) that carries the camera power lines --
# Source for the control-line mapping (PWDN=bit3, CAM_EN=bit1, RST=bit9):
# task/board notes for the reTerminal D1001. Set the expander's I2C bus pins and
# address to your board; verify on hardware.
i2c:
  - id: expander_bus
    sda: GPIO8                 # <-- verify: expander I2C SDA
    scl: GPIO7                 # <-- verify: expander I2C SCL
    frequency: 400kHz

pca9554:
  - id: cam_expander
    address: 0x20
    pin_count: 16              # PCA9535/XL9535 = 16-bit

# --- MIPI-CSI camera capture (SC2356) -----------------------------------------
esp_video_camera:
  id: d1001_cam
  sda: 37                      # SC2356 SCCB (sensor I2C)
  scl: 38
  resolution: 1280x720
  rotation: 90                 # portrait mounting — verify direction on hardware
  swap_rgb: false              # flip if detections are poor / colors look wrong
  enable_pin:                  # CAM_EN = expander bit 1
    pca9554: cam_expander
    number: 1
  powerdown_pin:               # PWDN = expander bit 3 (active-high power-down)
    pca9554: cam_expander
    number: 3
  reset_pin:                   # RST = expander bit 9 (active-low)
    pca9554: cam_expander
    number: 9
    inverted: true

# --- The detector -------------------------------------------------------------
person_detect:
  id: presence
  frame_source_id: d1001_cam   # raw RGB backend (not camera_id)
  interval: 1500ms
  confidence_threshold: 60%
  clear_after: 3
  model: pedestrian
  on_person_detected:
    - logger.log: "Person detected"
  on_person_cleared:
    - logger.log: "Room is now empty"

binary_sensor:
  - platform: person_detect
    person_detect_id: presence
    name: "Room Occupied"
    filters:
      - delayed_off: 15s

sensor:
  - platform: person_detect
    person_detect_id: presence
    type: confidence
    name: "Presence Confidence"
  - platform: person_detect
    person_detect_id: presence
    type: count
    name: "People Count"

switch:
  - platform: person_detect
    person_detect_id: presence
    name: "Presence Detection"   # privacy toggle: off => camera idle
